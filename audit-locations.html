<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Locations — Drill-Down</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:#141414;--surface-2:#1C1C1C;--surface-3:#242424;
  --border:#2A2A2A;--border-light:#333;--border-lighter:#444;
  --text:#F0F0F0;--text-2:#A0A0A0;--text-3:#666;
  --green:#00E676;--green-dim:rgba(0,230,118,.12);
  --amber:#FFB300;--amber-dim:rgba(255,179,0,.14);
  --red:#FF5252;--red-dim:rgba(255,82,82,.14);
  --blue:#448AFF;--blue-dim:rgba(68,138,255,.12);
  --purple:#7C4DFF;--teal:#00BFA5;
  --r:14px;--r-sm:9px;
  --mono:'SF Mono','Monaco','Consolas','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
}
html{background:#0A0A0A}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.module{max-width:1400px;margin:0 auto;padding:24px}

.mod-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.mod-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.mod-title span{color:var(--green)}

.breadcrumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:20px}
.crumb{font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;padding:4px 10px;border-radius:6px;transition:all .15s;background:transparent;border:none;font-family:inherit}
.crumb:hover{background:var(--surface-3);color:var(--text-2)}
.crumb.active{color:var(--green);background:var(--green-dim);cursor:default}
.crumb-sep{color:var(--text-3);font-size:12px}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}

.blocks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.block-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.block-tile:hover{border-color:var(--border-lighter);transform:translateY(-2px)}
.block-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--green))}
.block-tile-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.block-tile-name{font-size:18px;font-weight:700;margin-bottom:4px}
.block-tile-meta{font-size:12px;color:var(--text-3);font-family:var(--mono)}
.block-tile-pct{font-size:32px;font-weight:800;font-family:var(--mono);letter-spacing:-1.5px}
.block-tile-stats{display:flex;gap:20px;margin-bottom:14px}
.block-stat-item .sv{font-size:16px;font-weight:700;font-family:var(--mono)}
.block-stat-item .sl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.block-tile-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;margin-bottom:12px}
.block-tile-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.block-tile-footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3)}
.drill-arrow{font-weight:700}

.aisles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.aisle-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;cursor:pointer;transition:all .15s}
.aisle-tile:hover{border-color:var(--border-lighter);transform:translateY(-1px)}
.aisle-tile-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.aisle-tile-id{font-size:18px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px}
.aisle-tile-pct{font-size:14px;font-weight:700;font-family:var(--mono)}
.aisle-tile-meta{font-size:11px;color:var(--text-3);font-family:var(--mono);margin-bottom:8px}
.aisle-tile-bar{height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden}
.aisle-tile-fill{height:100%;border-radius:2px;transition:width .6s ease}

.locs-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.locs-toolbar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.locs-search{flex:1;min-width:200px;max-width:320px;padding:8px 12px;background:var(--surface-3);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:inherit;font-size:13px;outline:none}
.locs-search:focus{border-color:var(--green)}
.locs-filters{display:flex;gap:6px;flex-wrap:wrap}
.f-chip{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-3);transition:all .15s;font-family:inherit}
.f-chip.active{background:var(--green-dim);color:var(--green);border-color:var(--green)}
.f-chip:hover:not(.active){color:var(--text-2);border-color:var(--border-lighter)}

.locs-table-wrap{overflow-x:auto}
.locs-table{width:100%;border-collapse:collapse;font-size:13px}
.locs-table thead{background:var(--surface-2);position:sticky;top:0;z-index:1}
.locs-table th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap}
.locs-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.locs-table tbody tr{transition:background .1s}
.locs-table tbody tr:hover{background:var(--surface-2)}
.locs-table tbody tr:last-child td{border-bottom:none}

.loc-id-cell{font-family:var(--mono);font-weight:600;font-size:13px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-occ{background:var(--blue-dim);color:var(--blue)}
.b-emp{background:var(--surface-3);color:var(--text-3)}
.b-match{background:var(--green-dim);color:var(--green)}
.b-disc{background:var(--red-dim);color:var(--red)}
.b-pending{background:var(--amber-dim);color:var(--amber)}
.sku-cell{font-family:var(--mono);font-size:12px;color:var(--text-2)}
.qty-cell{font-family:var(--mono);font-size:12px;text-align:right;width:80px}
.empty-val{color:var(--text-3)}

.locs-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3);flex-wrap:wrap;gap:8px}

.empty-view{padding:40px;text-align:center;color:var(--text-3)}
.empty-view .icon{font-size:36px;opacity:.3;margin-bottom:8px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-lighter)}

.btn{padding:8px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-ghost{background:var(--surface-3);color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-lighter);color:var(--text)}
</style>
</head>
<body>

<div class="module" id="module"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   AUDIT LOCATIONS DRILL-DOWN MODULE
   Hierarchy: Blocks → Aisles → Locations
   ═══════════════════════════════════════════════════════════════ */

// Wrap everything in an IIFE but attach handlers to window
(function() {

// ─── DATA MODEL ───────────────────────────────────────────────
var BLOCKS = [
  {
    id: 'C', name: 'C Block', color: '#448AFF', description: 'Primary ambient storage',
    aisles: [
      {id:'CB',totalLocs:31},{id:'CC',totalLocs:28},{id:'CD',totalLocs:33},{id:'CE',totalLocs:29},
      {id:'CF',totalLocs:27},{id:'CG',totalLocs:25},{id:'CH',totalLocs:22},{id:'CJ',totalLocs:24},
      {id:'CK',totalLocs:20},{id:'CL',totalLocs:19},{id:'CM',totalLocs:18},{id:'CN',totalLocs:16},
      {id:'CP',totalLocs:15},{id:'CQ',totalLocs:14}
    ]
  },
  {
    id: 'D', name: 'D Block', color: '#448AFF', description: 'Reserve racking',
    aisles: [
      {id:'DB',totalLocs:18},{id:'DC',totalLocs:16},{id:'DD',totalLocs:15},
      {id:'DE',totalLocs:17},{id:'DF',totalLocs:14}
    ]
  },
  {
    id: 'F', name: 'F Block', color: '#7C4DFF', description: 'High-velocity pick zones',
    aisles: [
      {id:'FB',totalLocs:24},{id:'FC',totalLocs:22},{id:'FD',totalLocs:38},{id:'FE',totalLocs:36},
      {id:'FF',totalLocs:40},{id:'FG',totalLocs:42},{id:'FH',totalLocs:20},{id:'FJ',totalLocs:18},
      {id:'FL',totalLocs:22},{id:'FM',totalLocs:20}
    ]
  },
  {
    id: 'H', name: 'H Block', color: '#00BFA5', description: 'Bulk overflow & staging',
    aisles: [
      {id:'HB',totalLocs:22},{id:'HC',totalLocs:20},{id:'HD',totalLocs:19},
      {id:'HE',totalLocs:18},{id:'HF',totalLocs:17},{id:'HG',totalLocs:16}
    ]
  }
];

var SKU_POOL = ['HEB-10432','HEB-10518','HEB-11104','HEB-11876','HEB-12045','HEB-12533','HEB-13201','HEB-14089','HEB-14722','HEB-15103','HEB-15889','HEB-16412','HEB-17045','HEB-17623','HEB-18094'];
var PROD_POOL = ['Organic Flour 50lb','Bulk Sugar 100lb','Tortilla Mix','Cooking Oil 5gal','Salt Bags','Yeast Packets','Spice Blend','Masa Harina','Rice 25lb','Corn Meal','Baking Powder','Chili Powder','Paprika 10lb','Cinnamon Sticks','Oregano Flakes'];

function genLocations(aisleId, count) {
  var locs = [];
  for (var i = 1; i <= count; i++) {
    var slotId = aisleId + '-' + (i < 10 ? '0' + i : i);
    var isOccupied = Math.random() > 0.24;
    var skuIdx = Math.floor(Math.random() * SKU_POOL.length);
    var auditStatuses = ['pending','match','disc'];
    locs.push({
      id: slotId,
      occupied: isOccupied,
      sku: isOccupied ? SKU_POOL[skuIdx] : null,
      product: isOccupied ? PROD_POOL[skuIdx] : null,
      qty: isOccupied ? Math.floor(Math.random() * 48) + 1 : 0,
      lastMove: isOccupied ? new Date(Date.now() - Math.floor(Math.random() * 45) * 86400000).toISOString().slice(0,10) : null,
      auditStatus: auditStatuses[Math.floor(Math.random()*3)]
    });
  }
  return locs;
}

// Build data tree
for (var bi = 0; bi < BLOCKS.length; bi++) {
  var block = BLOCKS[bi];
  for (var ai = 0; ai < block.aisles.length; ai++) {
    var aisle = block.aisles[ai];
    aisle.locations = genLocations(aisle.id, aisle.totalLocs);
    aisle.occupied = aisle.locations.filter(function(l){return l.occupied}).length;
    aisle.empty = aisle.locations.filter(function(l){return !l.occupied}).length;
  }
  block.totalLocs = block.aisles.reduce(function(s,a){return s + a.totalLocs}, 0);
  block.occupied = block.aisles.reduce(function(s,a){return s + a.occupied}, 0);
  block.empty = block.aisles.reduce(function(s,a){return s + a.empty}, 0);
}

// ─── STATE ────────────────────────────────────────────────────
var S = {
  level: 'blocks',
  blockId: null,
  aisleId: null,
  search: '',
  filter: 'all',
  focusSearch: false
};

// ─── HELPERS ──────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString(); }
function pct(v) { return (v * 100).toFixed(1) + '%'; }
function barCol(p) { return p >= 0.9 ? 'var(--red)' : p >= 0.75 ? 'var(--amber)' : 'var(--green)'; }
function getBlock(id) {
  for (var i = 0; i < BLOCKS.length; i++) if (BLOCKS[i].id === id) return BLOCKS[i];
  return null;
}
function getAisle(blockId, aisleId) {
  var b = getBlock(blockId);
  if (!b) return null;
  for (var i = 0; i < b.aisles.length; i++) if (b.aisles[i].id === aisleId) return b.aisles[i];
  return null;
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  var mod = document.getElementById('module');
  var html = '';
  html += '<div class="mod-head">';
  html += '<div class="mod-title">Audit <span>Locations</span></div>';
  html += '<button class="btn btn-ghost" id="exportBtn">Export Current View</button>';
  html += '</div>';
  html += renderBreadcrumb();
  if (S.level === 'blocks') html += renderBlocksView();
  else if (S.level === 'aisles') html += renderAislesView();
  else html += renderLocationsView();
  mod.innerHTML = html;
  bindEvents();
}

function renderBreadcrumb() {
  var block = S.blockId ? getBlock(S.blockId) : null;
  var aisle = S.aisleId ? getAisle(S.blockId, S.aisleId) : null;
  var html = '<div class="breadcrumb">';
  html += '<button class="crumb ' + (S.level==='blocks'?'active':'') + '" data-nav="blocks">All Blocks</button>';
  if (block) {
    html += '<span class="crumb-sep">›</span>';
    html += '<button class="crumb ' + (S.level==='aisles'?'active':'') + '" data-nav="aisles" data-block="' + block.id + '">' + block.name + '</button>';
  }
  if (aisle) {
    html += '<span class="crumb-sep">›</span>';
    html += '<button class="crumb active">Aisle ' + aisle.id + '</button>';
  }
  html += '</div>';
  return html;
}

function renderBlocksView() {
  var totalLocs = BLOCKS.reduce(function(s,b){return s + b.totalLocs}, 0);
  var totalOcc = BLOCKS.reduce(function(s,b){return s + b.occupied}, 0);
  var totalEmp = BLOCKS.reduce(function(s,b){return s + b.empty}, 0);
  var totalAisles = BLOCKS.reduce(function(s,b){return s + b.aisles.length}, 0);

  var html = '<div class="stats-row">';
  html += '<div class="stat-card"><div class="stat-label">Total Blocks</div><div class="stat-val">' + BLOCKS.length + '</div><div class="stat-sub">' + totalAisles + ' aisles total</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Total Locations</div><div class="stat-val">' + fmt(totalLocs) + '</div><div class="stat-sub">Across all blocks</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Occupied</div><div class="stat-val" style="color:var(--blue)">' + fmt(totalOcc) + '</div><div class="stat-sub">' + pct(totalOcc/totalLocs) + ' utilized</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Empty</div><div class="stat-val" style="color:var(--green)">' + fmt(totalEmp) + '</div><div class="stat-sub">' + pct(totalEmp/totalLocs) + ' available</div></div>';
  html += '</div>';

  html += '<div class="blocks-grid">';
  for (var i = 0; i < BLOCKS.length; i++) {
    var b = BLOCKS[i];
    var p = b.occupied / b.totalLocs;
    html += '<div class="block-tile" style="--accent:' + b.color + '" data-nav="aisles" data-block="' + b.id + '">';
    html += '<div class="block-tile-head">';
    html += '<div><div class="block-tile-name">' + b.name + '</div><div class="block-tile-meta">' + b.description + '</div></div>';
    html += '<div class="block-tile-pct" style="color:' + b.color + '">' + pct(p) + '</div>';
    html += '</div>';
    html += '<div class="block-tile-stats">';
    html += '<div class="block-stat-item"><div class="sv">' + b.aisles.length + '</div><div class="sl">Aisles</div></div>';
    html += '<div class="block-stat-item"><div class="sv">' + fmt(b.totalLocs) + '</div><div class="sl">Locations</div></div>';
    html += '<div class="block-stat-item"><div class="sv" style="color:var(--blue)">' + fmt(b.occupied) + '</div><div class="sl">Occupied</div></div>';
    html += '<div class="block-stat-item"><div class="sv" style="color:var(--green)">' + fmt(b.empty) + '</div><div class="sl">Empty</div></div>';
    html += '</div>';
    html += '<div class="block-tile-bar"><div class="block-tile-fill" style="width:' + (p*100) + '%;background:' + b.color + '"></div></div>';
    html += '<div class="block-tile-footer"><span>Click to explore aisles</span><span class="drill-arrow" style="color:' + b.color + '">→</span></div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderAislesView() {
  var block = getBlock(S.blockId);
  if (!block) return '';
  var p = block.occupied / block.totalLocs;

  var html = '<div class="stats-row">';
  html += '<div class="stat-card"><div class="stat-label">Block</div><div class="stat-val" style="color:' + block.color + '">' + block.name + '</div><div class="stat-sub">' + block.description + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Aisles</div><div class="stat-val">' + block.aisles.length + '</div><div class="stat-sub">In this block</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Utilization</div><div class="stat-val" style="color:' + barCol(p) + '">' + pct(p) + '</div><div class="stat-sub">' + fmt(block.occupied) + '/' + fmt(block.totalLocs) + ' locs</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Available</div><div class="stat-val" style="color:var(--green)">' + fmt(block.empty) + '</div><div class="stat-sub">Empty locations</div></div>';
  html += '</div>';

  html += '<div class="aisles-grid">';
  for (var i = 0; i < block.aisles.length; i++) {
    var a = block.aisles[i];
    var ap = a.occupied / a.totalLocs;
    html += '<div class="aisle-tile" data-nav="locations" data-block="' + block.id + '" data-aisle="' + a.id + '">';
    html += '<div class="aisle-tile-head"><div class="aisle-tile-id">' + a.id + '</div><div class="aisle-tile-pct" style="color:' + barCol(ap) + '">' + pct(ap) + '</div></div>';
    html += '<div class="aisle-tile-meta">' + a.occupied + '/' + a.totalLocs + ' occupied · ' + a.empty + ' empty</div>';
    html += '<div class="aisle-tile-bar"><div class="aisle-tile-fill" style="width:' + (ap*100) + '%;background:' + barCol(ap) + '"></div></div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderLocationsView() {
  var block = getBlock(S.blockId);
  var aisle = getAisle(S.blockId, S.aisleId);
  if (!aisle) return '';

  var locs = aisle.locations.slice();
  if (S.search) {
    var q = S.search.toLowerCase();
    locs = locs.filter(function(l){
      return l.id.toLowerCase().indexOf(q) !== -1 ||
             (l.sku && l.sku.toLowerCase().indexOf(q) !== -1) ||
             (l.product && l.product.toLowerCase().indexOf(q) !== -1);
    });
  }
  if (S.filter === 'occupied') locs = locs.filter(function(l){return l.occupied});
  if (S.filter === 'empty') locs = locs.filter(function(l){return !l.occupied});
  if (S.filter === 'disc') locs = locs.filter(function(l){return l.auditStatus === 'disc'});

  var html = '<div class="stats-row">';
  html += '<div class="stat-card"><div class="stat-label">Aisle</div><div class="stat-val" style="color:' + block.color + '">' + aisle.id + '</div><div class="stat-sub">' + block.name + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Total Locations</div><div class="stat-val">' + aisle.totalLocs + '</div><div class="stat-sub">In this aisle</div></div>';
  html += '<div class="stat-card"><div class="stat-label">With Inventory</div><div class="stat-val" style="color:var(--blue)">' + aisle.occupied + '</div><div class="stat-sub">' + pct(aisle.occupied/aisle.totalLocs) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Empty</div><div class="stat-val" style="color:var(--green)">' + aisle.empty + '</div><div class="stat-sub">' + pct(aisle.empty/aisle.totalLocs) + '</div></div>';
  html += '</div>';

  html += '<div class="locs-panel">';
  html += '<div class="locs-toolbar">';
  html += '<input class="locs-search" id="locSearch" placeholder="Search location, SKU, or product…" value="' + S.search.replace(/"/g,'&quot;') + '">';
  html += '<div class="locs-filters">';
  html += '<button class="f-chip ' + (S.filter==='all'?'active':'') + '" data-filter="all">All (' + aisle.totalLocs + ')</button>';
  html += '<button class="f-chip ' + (S.filter==='occupied'?'active':'') + '" data-filter="occupied">Occupied (' + aisle.occupied + ')</button>';
  html += '<button class="f-chip ' + (S.filter==='empty'?'active':'') + '" data-filter="empty">Empty (' + aisle.empty + ')</button>';
  html += '<button class="f-chip ' + (S.filter==='disc'?'active':'') + '" data-filter="disc">Discrepancies</button>';
  html += '</div>';
  html += '</div>';

  html += '<div class="locs-table-wrap">';
  if (locs.length === 0) {
    html += '<div class="empty-view"><div class="icon">—</div><div>No locations match your filter</div></div>';
  } else {
    html += '<table class="locs-table">';
    html += '<thead><tr><th>Location</th><th>Status</th><th>SKU</th><th>Product</th><th style="text-align:right">Qty</th><th>Last Move</th><th>Audit</th></tr></thead>';
    html += '<tbody>';
    for (var i = 0; i < locs.length; i++) {
      var l = locs[i];
      html += '<tr>';
      html += '<td class="loc-id-cell">' + l.id + '</td>';
      html += '<td><span class="badge ' + (l.occupied?'b-occ':'b-emp') + '">' + (l.occupied?'OCCUPIED':'EMPTY') + '</span></td>';
      html += '<td class="sku-cell">' + (l.sku || '<span class="empty-val">—</span>') + '</td>';
      html += '<td>' + (l.product || '<span class="empty-val">—</span>') + '</td>';
      html += '<td class="qty-cell">' + (l.occupied ? l.qty : '<span class="empty-val">—</span>') + '</td>';
      html += '<td class="sku-cell">' + (l.lastMove || '<span class="empty-val">—</span>') + '</td>';
      var badgeClass = l.auditStatus==='match' ? 'b-match' : l.auditStatus==='disc' ? 'b-disc' : 'b-pending';
      var badgeText = l.auditStatus==='match' ? '✓ MATCH' : l.auditStatus==='disc' ? '⚠ DISC' : 'PENDING';
      html += '<td><span class="badge ' + badgeClass + '">' + badgeText + '</span></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
  }
  html += '</div>';

  html += '<div class="locs-footer">';
  html += '<span>Showing ' + locs.length + ' of ' + aisle.totalLocs + ' locations</span>';
  html += '<span>Source: D365 ERPDataModelLH · Updated daily 5:00 AM</span>';
  html += '</div>';
  html += '</div>';
  return html;
}

// ─── EVENT BINDING ────────────────────────────────────────────
function bindEvents() {
  // Navigation clicks (blocks, aisles, breadcrumb, tiles)
  var navEls = document.querySelectorAll('[data-nav]');
  for (var i = 0; i < navEls.length; i++) {
    navEls[i].addEventListener('click', function(e) {
      var t = e.currentTarget;
      var level = t.getAttribute('data-nav');
      var block = t.getAttribute('data-block');
      var aisle = t.getAttribute('data-aisle');
      goTo(level, block, aisle);
    });
  }

  // Filter chips
  var filterEls = document.querySelectorAll('[data-filter]');
  for (var j = 0; j < filterEls.length; j++) {
    filterEls[j].addEventListener('click', function(e) {
      S.filter = e.currentTarget.getAttribute('data-filter');
      render();
    });
  }

  // Search input — preserve focus & cursor across renders
  var searchEl = document.getElementById('locSearch');
  if (searchEl) {
    if (S.focusSearch) {
      searchEl.focus();
      var len = searchEl.value.length;
      searchEl.setSelectionRange(len, len);
    }
    searchEl.addEventListener('input', function(e) {
      S.search = e.target.value;
      S.focusSearch = true;
      render();
    });
    searchEl.addEventListener('blur', function() {
      S.focusSearch = false;
    });
  }

  // Export button
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', exportCurrent);
}

function goTo(level, blockId, aisleId) {
  S.level = level;
  S.blockId = blockId || null;
  S.aisleId = aisleId || null;
  S.search = '';
  S.filter = 'all';
  S.focusSearch = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function exportCurrent() {
  var csv = '';
  var filename = '';

  if (S.level === 'blocks') {
    csv = 'Block,Description,Aisles,Total Locations,Occupied,Empty,Utilization %\n';
    for (var i = 0; i < BLOCKS.length; i++) {
      var b = BLOCKS[i];
      csv += b.name + ',"' + b.description + '",' + b.aisles.length + ',' + b.totalLocs + ',' + b.occupied + ',' + b.empty + ',' + (b.occupied/b.totalLocs*100).toFixed(1) + '\n';
    }
    filename = 'scw_blocks_summary.csv';
  } else if (S.level === 'aisles') {
    var block = getBlock(S.blockId);
    csv = 'Aisle,Total Locations,Occupied,Empty,Utilization %\n';
    for (var k = 0; k < block.aisles.length; k++) {
      var a = block.aisles[k];
      csv += a.id + ',' + a.totalLocs + ',' + a.occupied + ',' + a.empty + ',' + (a.occupied/a.totalLocs*100).toFixed(1) + '\n';
    }
    filename = 'scw_aisles_' + block.id + '.csv';
  } else {
    var aisle = getAisle(S.blockId, S.aisleId);
    csv = 'Location,Status,SKU,Product,Quantity,Last Move,Audit Status\n';
    for (var m = 0; m < aisle.locations.length; m++) {
      var l = aisle.locations[m];
      csv += l.id + ',' + (l.occupied?'OCCUPIED':'EMPTY') + ',' + (l.sku||'') + ',"' + (l.product||'') + '",' + l.qty + ',' + (l.lastMove||'') + ',' + l.auditStatus + '\n';
    }
    filename = 'scw_locations_' + aisle.id + '.csv';
  }

  var blob = new Blob([csv], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ─── INIT ─────────────────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', render);
} else {
  render();
}

})();
</script>
